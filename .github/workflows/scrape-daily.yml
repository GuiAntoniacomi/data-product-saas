name: Scraper Diário — Módulo 1A

on:
  schedule:
    - cron: '0 11 * * *'  # 8h horário de Brasília (UTC-3)
  workflow_dispatch:       # permite rodar manualmente pelo GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Instalar dependências
        run: pip install -r scraper/requirements.txt

      - name: Instalar Playwright browsers
        run: playwright install chromium --with-deps

      - name: Executar scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scraper/main.py
